# Supports the Markdown-alternative content negotiation in the "location
# /blog/" block of nginx_siteconf: if a client's Accept header asks for
# text/markdown (or text/plain) and a page has a sibling .md mirror (see
# _prepare_markdown_mirrors/_write_markdown_mirrors in pelicanconf.py), serve
# that instead of the compiled HTML. Prior art: gwern.net does the same
# thing for the same reason (LLM-agent support) --
# <https://github.com/gwern/gwern.net/commit/79ded21772a9aa338158c16a19dd4dad5a8f3d6b>.
#
# This is an aAL-specific concern, not a generally-shared one like
# common_expires_map.conf, so map names are namespaced ($aal_...) rather
# than generic.
#
# Included once from nginx.conf's http{} block (map directives can't live
# inside a server{} block).

# Article URLs are directories (ARTICLE_URL ends in "/" -- see
# pelicanconf.py), but a page's markdown_url is its directory's *sibling*
# with no trailing slash (dirname(save_as) + '.md'), so the trailing slash
# has to come off before appending ".md". Static-asset URLs (no trailing
# slash to begin with) pass through unchanged.
map $uri $aal_uri_sans_trailing_slash {
    "~^(?<base>.*)/$" $base;
    default                $uri;
}

# gwern.net's version uses `if`, which requires unrolling since nginx
# disallows nested `if`s inside a location. We can dodge `if` (and the
# well-known "IfIsEvil" footguns that come with mixing it into
# try_files-driven logic) entirely: fold "does the client want markdown" into
# a string that's either ".md" or empty, and let try_files' own
# first-candidate-that-exists-wins semantics (already relied on elsewhere in
# nginx_siteconf) do the branching. When a client doesn't ask for markdown,
# this suffix is empty and the resulting candidate is byte-for-byte identical
# to the plain $uri candidate already tried today -- so behavior for
# ordinary browser traffic is provably unchanged.
map $http_accept $aal_wants_markdown_suffix {
    default                 "";
    "~*text/markdown"       ".md";
    "~*text/plain"          ".md";
}
