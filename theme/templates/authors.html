{% extends "base.html" %}

{% block title %}{{ SITENAME }} - Authors{% endblock %}

{% block content %}
    <h2 class="archive-title">Authors</h2>
    <ul class="archive-list">
        {% for author, articles in authors|sort %}
            <li><a href="{{ SITEURL }}/{{ author.url }}">{{ author }}</a> ({{ articles|count }})</li>
        {% endfor %}
    </ul>
{% endblock %}
