{% extends "base.html" %}
{% import "includes/post_card.html" as post_card with context %}

{% block title %}{{ article.title }} - {{ SITENAME }}{% endblock %}

{% block extra_head %}
<link rel="alternate" type="text/markdown" title="{{ article.title }} (Markdown)" href="{{ SITEURL }}/{{ article.markdown_url }}">
{% endblock %}

{% block content %}
    {{ post_card.render_post(article) }}
{% endblock %}
